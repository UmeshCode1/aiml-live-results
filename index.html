<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AI & Machine Learning Club OCT - Live Update Portal for events, results, and real-time feeds.">
    <meta name="theme-color" content="#05050A">
    <meta property="og:title" content="Live Updates | AI & ML Club OCT">
    <meta property="og:description" content="Access the real-time Live Update Portal for the AI & Machine Learning Club at Oriental College of Technology.">
    <meta property="og:image" content="logo.png">
    <meta property="og:url" content="https://aimlcluboct.in/">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <title>Live Updates | AI & ML Club OCT</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div id="loading-screen" class="loading-screen">
        <div class="loader">
            <div class="loader-logo-wrapper">
                <img src="logo.png" alt="AIML Club Logo" class="loader-logo">
                <div class="cyber-circle"></div>
            </div>
            <div class="loader-text">INITIALIZING AI & MACHINE LEARNING CLUB - OCT...</div>
        </div>
    </div>

    <div class="ambient-background">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
        <div class="grid-overlay"></div>
    </div>

    <main class="app-container">
        <header class="glass-header">
            <div class="brand">
                <div class="logos-container">
                    <img src="logo.png" alt="AIML Club Logo" class="club-logo">
                    <img src="oct-logo.png" alt="OCT Logo" class="club-logo oct-logo">
                </div>
                <div class="brand-text">
                    <span class="club-name">AI & ML CLUB</span>
                    <span class="badge" title="Oriental College of Technology, Bhopal">OCT</span>
                </div>
            </div>
            <h1 class="title">LIVE <span class="highlight">UPDATES</span></h1>
            <button id="refresh-btn" class="status btn-refresh" title="Refresh Live Data">
                <i class="fas fa-sync-alt spin-icon"></i>
                <span class="status-text">REFRESH</span>
            </button>
        </header>

        <section class="document-container glass-panel">
            <div class="panel-header">
                <div class="panel-title"><i class="fas fa-file-alt"></i> LIVE BROADCAST</div>
                <div class="panel-controls">
                    <span class="control-dot"></span>
                    <span class="control-dot"></span>
                    <span class="control-dot"></span>
                </div>
            </div>
            <div class="iframe-wrapper">
                <iframe id="docs-iframe"
                    src="https://docs.google.com/document/d/e/2PACX-1vTNv1JQSN-hUP1yvWyPTW5PPYHCYdRrOb6ZTjXRUQIUXGAiZVQRphPblG6BFBSIQP_YdStj1466aeQs/pub?embedded=true"
                    frameborder="0"
                    allowfullscreen>
                </iframe>
            </div>
        </section>

        <footer class="glass-footer">
            <div class="social-links">
                <a href="https://aimlcluboct.in/" target="_blank" title="Website" class="social-icon"><i class="fas fa-globe"></i></a>
                <a href="https://www.linkedin.com/company/aimlcluboct" target="_blank" title="LinkedIn" class="social-icon"><i class="fab fa-linkedin-in"></i></a>
                <a href="https://github.com/aimlcluboct" target="_blank" title="GitHub" class="social-icon"><i class="fab fa-github"></i></a>
                <a href="https://www.instagram.com/aimlcluboct" target="_blank" title="Instagram" class="social-icon"><i class="fab fa-instagram"></i></a>
                <a href="https://www.commudle.com/communities/ai-ml-club" target="_blank" title="Commudle" class="social-icon"><i class="fas fa-users"></i></a>
                <a href="https://whatsapp.com/channel/0029VbAthv38V0tfulumuV1D" target="_blank" title="WhatsApp Channel" class="social-icon"><i class="fab fa-whatsapp"></i></a>
                <a href="https://chat.whatsapp.com/ITBTDOgerQVLnw9dq7jxN6" target="_blank" title="WhatsApp Group" class="social-icon"><i class="fas fa-comments"></i></a>
            </div>
        </footer>
    </main>

    <script src="script.js"></script>
</body>
</html>
