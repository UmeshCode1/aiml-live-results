<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AI & Machine Learning Club OCT - Live Results">
    <title>Live Results | AI & ML Club OCT</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div id="loading-screen" class="loading-screen">
        <div class="loader">
            <div class="glow-orb"></div>
            <div class="loader-text">INITIALIZING NEURAL NET...</div>
        </div>
    </div>

    <div class="ambient-background">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
        <div class="grid-overlay"></div>
    </div>

    <main class="app-container">
        <header class="glass-header">
            <div class="brand">
                <span class="club-name">AIML CLUB</span>
                <span class="badge">OCT</span>
            </div>
            <h1 class="title">LIVE <span class="highlight">RESULTS</span></h1>
            <div class="status">
                <span class="pulse"></span>
                <span class="status-text">SYSTEM ONLINE</span>
            </div>
        </header>

        <section class="document-container glass-panel">
            <div class="iframe-wrapper">
                <iframe 
                    src="https://docs.google.com/document/d/e/2PACX-1vTNv1JQSN-hUP1yvWyPTW5PPYHCYdRrOb6ZTjXRUQIUXGAiZVQRphPblG6BFBSIQP_YdStj1466aeQs/pub?embedded=true"
                    frameborder="0"
                    allowfullscreen>
                </iframe>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
