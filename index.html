<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AI & Machine Learning Club OCT — Live Update Portal for events, results, and real-time feeds.">
  <meta name="theme-color" content="#05050A">
  <meta property="og:title" content="Live Updates | AI & ML Club OCT">
  <meta property="og:description" content="Real-time Live Update Portal for the AI & Machine Learning Club at Oriental College of Technology, Bhopal.">
  <meta property="og:image" content="logo.png">
  <meta property="og:url" content="https://aimlcluboct.in/">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="apple-touch-icon" href="logo.png">
  <title>Live Updates | AI & ML Club OCT</title>
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <!-- Styles -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Scroll Progress -->
  <div class="scroll-progress" id="scroll-progress"></div>

  <!-- Loading Screen -->
  <div id="loading-screen" class="loading-screen">
    <div class="loader">
      <div class="loader-logo-wrapper">
        <img src="logo.png" alt="AI & ML Club Logo" class="loader-logo">
        <div class="cyber-circle"></div>
      </div>
      <div class="loader-text">INITIALIZING AI &amp; MACHINE LEARNING CLUB — OCT</div>
      <div class="progress-bar-container">
        <div class="progress-bar"></div>
      </div>
      <div class="percentage">0%</div>
    </div>
  </div>

  <!-- Ambient Background -->
  <div class="ambient-background" aria-hidden="true">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="grid-overlay"></div>
  </div>

  <!-- App -->
  <main class="app-container">

    <!-- Header -->
    <header class="glass-header">
      <div class="brand">
        <div class="logos-container">
          <img src="logo.png" alt="AI ML Club Logo" class="club-logo" loading="eager">
          <img src="oct-logo.png" alt="Oriental College of Technology Logo" class="club-logo oct-logo" loading="eager">
        </div>
        <div class="brand-text">
          <span class="club-name">AI &amp; ML CLUB</span>
          <span class="badge" title="Oriental College of Technology, Bhopal">OCT</span>
        </div>
      </div>

      <h1 class="title">LIVE <span class="highlight">UPDATES</span></h1>

      <button id="refresh-btn" class="btn-refresh" title="Refresh live content" aria-label="Refresh">
        <i class="fas fa-rotate spin-icon"></i>
        <span class="status-text">REFRESH</span>
      </button>
    </header>

    <!-- Status Bar -->
    <div class="status-bar" role="status" aria-live="polite">
      <div class="status-left">
        <span class="live-indicator">
          <span class="pulse-dot" aria-hidden="true"></span>
          LIVE
        </span>
        <span class="experience-tag">
          <i class="fas fa-bolt" aria-hidden="true"></i>
          LIVE UPDATE EXPERIENCE
        </span>
      </div>
      <div class="status-right">
        <i class="far fa-clock" aria-hidden="true"></i>
        <span id="current-time" aria-label="Current time">00:00:00 AM</span>
      </div>
    </div>

    <!-- Live Feed Panel -->
    <section class="glass-panel document-container" aria-label="Live event feed">
      <!-- Corner accents -->
      <div class="corner corner-tl" aria-hidden="true"></div>
      <div class="corner corner-tr" aria-hidden="true"></div>
      <div class="corner corner-bl" aria-hidden="true"></div>
      <div class="corner corner-br" aria-hidden="true"></div>

      <!-- Panel Header -->
      <div class="panel-header">
        <div class="title-group">
          <div class="panel-title">
            <i class="fas fa-rss" aria-hidden="true"></i>
            LIVE EVENT FEED
          </div>
          <div class="typing-text" id="typing-text" aria-label="Status"></div>
        </div>
        <div class="panel-controls" aria-hidden="true">
          <span class="control-dot"></span>
          <span class="control-dot"></span>
          <span class="control-dot"></span>
        </div>
      </div>

      <!-- Document Viewer -->
      <div class="iframe-wrapper">
        <!-- Skeleton -->
        <div class="skeleton-loader" id="skeleton-loader" aria-hidden="true">
          <div class="skeleton-line"></div>
          <div class="skeleton-line"></div>
          <div class="skeleton-line"></div>
        </div>
        <!-- Google Doc -->
        <iframe
          id="docs-iframe"
          src="https://docs.google.com/document/d/e/2PACX-1vTNv1JQSN-hUP1yvWyPTW5PPYHCYdRrOb6ZTjXRUQIUXGAiZVQRphPblG6BFBSIQP_YdStj1466aeQs/pub?embedded=true"
          title="Live Event Document"
          loading="lazy"
          allow="autoplay"
        ></iframe>
      </div>
    </section>

    <!-- Footer -->
    <footer class="glass-footer">
      <nav class="social-links" aria-label="Social links">
        <a href="https://aimlcluboct.in/" target="_blank" rel="noopener" title="Website" class="social-icon" aria-label="Club website"><i class="fas fa-globe"></i></a>
        <a href="https://www.linkedin.com/company/aimlcluboct" target="_blank" rel="noopener" title="LinkedIn" class="social-icon" aria-label="LinkedIn"><i class="fab fa-linkedin-in"></i></a>
        <a href="https://github.com/aimlcluboct" target="_blank" rel="noopener" title="GitHub" class="social-icon" aria-label="GitHub"><i class="fab fa-github"></i></a>
        <a href="https://www.instagram.com/aimlcluboct" target="_blank" rel="noopener" title="Instagram" class="social-icon" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
        <a href="https://www.commudle.com/communities/ai-ml-club" target="_blank" rel="noopener" title="Commudle" class="social-icon" aria-label="Commudle community"><i class="fas fa-users"></i></a>
        <a href="https://whatsapp.com/channel/0029VbAthv38V0tfulumuV1D" target="_blank" rel="noopener" title="WhatsApp Channel" class="social-icon" aria-label="WhatsApp channel"><i class="fab fa-whatsapp"></i></a>
        <a href="https://chat.whatsapp.com/ITBTDOgerQVLnw9dq7jxN6" target="_blank" rel="noopener" title="WhatsApp Group" class="social-icon" aria-label="WhatsApp group"><i class="fas fa-comments"></i></a>
      </nav>
    </footer>

  </main>

  <!-- Back to Top -->
  <button id="back-to-top" class="back-to-top" aria-label="Back to top">
    <i class="fas fa-chevron-up"></i>
  </button>

  <script src="script.js"></script>
</body>
</html>
